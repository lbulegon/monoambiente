# SinapLint — monitorização em cada PR (sem polling ao GitHub)
#
# O JSON é gerado inline neste job; o campo `repo` é `github.repository` (ex.: lbulegon/monoambiente).
# Inclui `pr_number` para o painel agrupar no "Registo por pull request".
#
# Secrets: SINAPLINT_CI_URL (URL completa ci-report), SINAPLINT_API_KEY (UUID / X-API-KEY).
# Landing: NEXT_PUBLIC_SINAPLINT_API_URL para o painel mostrar a URL de ingestão.

name: SinapLint PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  sinaplint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar relatório (stub — substituir pelo runner SinapLint)
        env:
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REF: ${{ github.ref }}
          BRANCH: ${{ github.head_ref }}
        run: |
          mkdir -p .sinaplint
          python3 << 'PY'
          import json, os
          from pathlib import Path
          Path('.sinaplint').mkdir(parents=True, exist_ok=True)
          report = {
            "repo": os.environ["REPO"],
            "score": 82,
            "drift_score": 0.31,
            "daa": 0.74,
            "github_run_id": int(os.environ["RUN_ID"]),
            "sha": os.environ["SHA"],
            "ref": os.environ["REF"],
            "pr_number": int(os.environ["PR"]),
            "branch": os.environ["BRANCH"],
            "warnings": ["Possível crescimento de acoplamento"],
            "errors": [],
          }
          with open('.sinaplint/report.json', 'w') as f:
            json.dump(report, f, indent=2)
          PY
          cat .sinaplint/report.json

      - name: Enviar para SinapLint
        env:
          SINAPLINT_URL: ${{ secrets.SINAPLINT_CI_URL }}
          SINAPLINT_KEY: ${{ secrets.SINAPLINT_API_KEY }}
        run: |
          curl -sfS -X POST "$SINAPLINT_URL" \
            -H "X-API-KEY: $SINAPLINT_KEY" \
            -H "Content-Type: application/json" \
            -d @.sinaplint/report.json

      - name: Comentar no PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('.sinaplint/report.json', 'utf8'));
            const warn = (report.warnings || []).map((w) => '- ' + w).join('\n');
            const body =
              '## SinapLint\n\n' +
              '**Score:** ' + report.score + '/100\n' +
              '**Drift (stub):** ' + report.drift_score + '\n' +
              '**DAA (stub):** ' + report.daa + '\n\n' +
              '**Warnings:**\n' +
              (warn || '-') +
              '\n\n_Relatório ingerido no dashboard SinapLint._';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
