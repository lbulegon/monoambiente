# Continuous Integration — push e pull_request
# App React em web/ (react-scripts: build com CI=false, test sem watch).

name: Continuous Integration

on:
  push:
  pull_request:

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "24.x"

      - name: Run Install Build and Test
        run: |
          npm install
          npm run build
          npm run test
