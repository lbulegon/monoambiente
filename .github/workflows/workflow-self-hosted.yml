# CI na tua VPS (GitHub Actions — self-hosted runner)
#
# Pré-requisito: em GitHub → Settings → Actions → Runners → New self-hosted runner,
# segue os comandos na VPS Ubuntu para instalar o agente e associar a ESTE repositório.
#
# Este job NÃO usa ubuntu-latest do GitHub: corre só onde o runner estiver online.
# Se quiseres evitar jobs duplicados com workflow.yml (hosted), desactiva um dos dois
# em Settings → Actions → General, ou remove o ficheiro que não quiseres.
#
# O passo "Verificar Sinaplint" regista no log o estado de /opt/sinaplint antes do build
# (não altera esse diretório; só observação).

name: Continuous Integration (VPS self-hosted)

on:
  push:
  pull_request:

jobs:
  continuous-integration-vps:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Verificar Sinaplint
        run: ls -la /opt/sinaplint

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "24.x"

      - name: Run Install Build and Test
        run: |
          npm install
          npm run build
          npm run test
