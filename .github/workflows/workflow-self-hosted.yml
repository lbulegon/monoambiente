# SinapLint — despacho para Execution Plane na VPS (self-hosted)
#
# O GitHub Actions NÃO corre npm build/test aqui: apenas invoca o structural-runner
# instalado em /opt/sinaplint (ver SinapLint: infrastructure/execution-plane-v1/).
#
# Pré-requisitos na VPS:
#   - Runner GitHub self-hosted registado neste repositório
#   - sudo bash bootstrap-vps.sh (a partir do repositório SinapLint)
#   - git disponível no PATH do utilizador do runner

name: SinapLint VPS Runner

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sinaplint:
    runs-on: self-hosted
    steps:
      - name: Execute Structural Runner
        run: |
          /opt/sinaplint/runners/structural-runner/run.sh \
            "https://github.com/${{ github.repository }}.git" \
            "${{ github.head_ref }}"
